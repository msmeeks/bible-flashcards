name: bible_flashcards
description: Bible verse memorization flashcards app for Android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Database — encrypted SQLite
  sqflite_sqlcipher: ^3.4.0

  # File paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  provider: ^6.1.5+1

  # Typography
  google_fonts: ^8.1.0

  # Icons
  material_symbols_icons: ^4.2928.1

  # Audio playback (TTS only; just_audio removed as unused)
  flutter_tts: ^4.2.5

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Timezone resolution for scheduled notifications
  flutter_timezone: ^3.0.0
  timezone: ^0.11.0

  # Permissions (requested at point-of-use only)
  permission_handler: ^12.0.1

  # Animation
  flutter_animate: ^4.5.2

  # Settings persistence
  shared_preferences: ^2.5.5

  # Hardware-backed key storage (Android Keystore / iOS Keychain) for DB key
  flutter_secure_storage: ^10.3.1

  # Key derivation (no analytics SDKs)
  crypto: ^3.0.7

  # Charts — pure-Dart, no native code, MIT license
  fl_chart: ^0.68.0

  # Date formatting for engagement log
  intl: ^0.19.0

  # Export / Import / Google Drive backup
  google_sign_in: ^7.0.0
  googleapis: ^13.1.0
  share_plus: ^10.0.0

  # HTTP client for verse lookup and pack import
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/packs/
